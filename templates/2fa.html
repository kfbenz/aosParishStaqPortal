<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2FA Verification - ParishStaq Portal</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #1a365d 0%, #2c5282 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .login-card {
            background: white;
            border-radius: 10px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
            padding: 2rem;
            width: 100%;
            max-width: 400px;
        }
        .login-header {
            text-align: center;
            margin-bottom: 2rem;
        }
        .login-header i {
            font-size: 3rem;
            color: #1a365d;
        }
        .login-header h1 {
            font-size: 1.5rem;
            color: #1a365d;
            margin-top: 0.5rem;
        }
        .btn-primary {
            background-color: #1a365d;
            border-color: #1a365d;
        }
        .btn-primary:hover {
            background-color: #2c5282;
            border-color: #2c5282;
        }
        .code-input {
            font-size: 1.5rem;
            text-align: center;
            letter-spacing: 0.5rem;
            font-family: monospace;
        }
    </style>
</head>
<body>
    <div class="login-card">
        <div class="login-header">
            <i class="bi bi-shield-lock"></i>
            <h1>Two-Factor Authentication</h1>
            <p class="text-muted">Enter the code from your authenticator app</p>
        </div>
        
        {% if error %}
        <div class="alert alert-danger" role="alert">
            <i class="bi bi-exclamation-triangle"></i> {{ error }}
        </div>
        {% endif %}
        
        <form method="post" action="/auth/2fa">
            <div class="mb-4">
                <input type="text" class="form-control code-input" id="code" name="code" 
                       maxlength="6" pattern="[0-9]{6}" required autofocus
                       placeholder="000000" autocomplete="one-time-code">
            </div>
            <button type="submit" class="btn btn-primary w-100">
                <i class="bi bi-check-circle"></i> Verify
            </button>
        </form>
        
        <div class="mt-3 text-center">
            <a href="/auth/login" class="text-muted">
                <i class="bi bi-arrow-left"></i> Back to login
            </a>
        </div>
    </div>
    
    <script>
        // Auto-focus and auto-submit when 6 digits entered
        const codeInput = document.getElementById('code');
        codeInput.addEventListener('input', function() {
            this.value = this.value.replace(/[^0-9]/g, '');
            if (this.value.length === 6) {
                this.form.submit();
            }
        });
    </script>
</body>
</html>
